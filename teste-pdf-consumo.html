<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste - Relatório de Consumo PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        .container { max-width: 800px; margin: 20px auto; padding: 20px; }
        .btn { padding: 10px 20px; margin: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .btn:hover { background: #0056b3; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Teste - Relatório de Consumo PDF</h1>
        <p>Esta página testa especificamente a geração do PDF de consumo com o novo estilo profissional.</p>
        
        <div class="form-group">
            <label for="dataInicio">Data Início:</label>
            <input type="date" id="dataInicio" value="2024-01-01">
        </div>
        
        <div class="form-group">
            <label for="dataFim">Data Fim:</label>
            <input type="date" id="dataFim" value="2024-12-31">
        </div>
        
        <div class="form-group">
            <label for="caminhaoSelect">Caminhão:</label>
            <select id="caminhaoSelect">
                <option value="todos">Todos os caminhões</option>
                <option value="1">AAA-1234 - Volvo FH</option>
                <option value="2">BBB-5678 - Scania R450</option>
            </select>
        </div>
        
        <button class="btn" onclick="testarPDFConsumo()">🎯 Gerar PDF de Consumo (Novo Estilo)</button>
        <button class="btn" onclick="compararEstilos()">📊 Comparar com PDF de Custos</button>
        
        <div id="status"></div>
        
        <h2>📋 Dados de Teste</h2>
        <p>Para o teste, usaremos dados simulados similares aos do sistema real.</p>
    </div>

    <script>
        // Dados de teste simulados
        window.caminhoes = [
            { id: '1', placa: 'AAA-1234', modelo: 'Volvo FH' },
            { id: '2', placa: 'BBB-5678', modelo: 'Scania R450' },
            { id: '3', placa: 'CCC-9012', modelo: 'Mercedes Actros' },
            { id: '4', placa: 'DDD-3456', modelo: 'Iveco Stralis' }
        ];
        
        window.abastecimentos = [
            {
                id: '1',
                caminhao_id: '1',
                data: '2024-06-01T10:00:00Z',
                km_inicial: 10000,
                km_final: 10500,
                litros: 150,
                valor_total: 825.00
            },
            {
                id: '2',
                caminhao_id: '1',
                data: '2024-06-05T14:30:00Z',
                km_inicial: 10500,
                km_final: 11200,
                litros: 200,
                valor_total: 1100.00
            },
            {
                id: '3',
                caminhao_id: '2',
                data: '2024-06-03T09:15:00Z',
                km_inicial: 25000,
                km_final: 25600,
                litros: 180,
                valor_total: 990.00
            },
            {
                id: '4',
                caminhao_id: '2',
                data: '2024-06-08T16:45:00Z',
                km_inicial: 25600,
                km_final: 26400,
                litros: 220,
                valor_total: 1210.00
            }
        ];

        // Sistema de alertas simulado
        window.AlertError = {
            validation: (msg) => alert('❌ Erro: ' + msg),
            show: (title, msg) => alert(`❌ ${title}: ${msg}`)
        };
        
        window.AlertWarning = {
            noData: (msg) => alert('⚠️ Aviso: ' + msg)
        };
        
        window.AlertToast = {
            success: (msg) => {
                document.getElementById('status').innerHTML = `<div class="status success">✅ ${msg}</div>`;
                console.log('✅ ' + msg);
            }
        };

        // Função para mostrar status
        function mostrarStatus(msg, tipo = 'success') {
            const className = tipo === 'error' ? 'error' : 'success';
            document.getElementById('status').innerHTML = `<div class="status ${className}">${msg}</div>`;
        }

        function testarPDFConsumo() {
            mostrarStatus('🔄 Iniciando geração do PDF de consumo...', 'success');
            
            try {
                // Simular a chamada da função
                if (typeof exportarPdfCompleto === 'function') {
                    exportarPdfCompleto();
                } else {
                    mostrarStatus('❌ Função exportarPdfCompleto não encontrada!', 'error');
                }
            } catch (error) {
                console.error('Erro ao testar PDF:', error);
                mostrarStatus(`❌ Erro: ${error.message}`, 'error');
            }
        }
        
        function compararEstilos() {
            mostrarStatus('📊 Para comparar: gere primeiro o PDF de consumo, depois acesse o sistema real e gere o PDF de custos.', 'success');
        }
    </script>
    
    <!-- Incluir o arquivo de relatórios -->
    <script src="frontend/src/js/relatorios.js"></script>
</body>
</html>
