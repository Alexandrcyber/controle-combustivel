<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Final - Correções Aplicadas</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        .status { padding: 15px; margin: 10px 0; border-radius: 8px; }
        .success { background-color: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .error { background-color: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        .info { background-color: #d1ecf1; border: 1px solid #bee5eb; color: #0c5460; }
        .warning { background-color: #fff3cd; border: 1px solid #ffeaa7; color: #856404; }
        pre { background-color: #f8f9fa; padding: 15px; border-radius: 5px; overflow-x: auto; font-size: 12px; }
        .section { margin: 20px 0; border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
        h3 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
    </style>
</head>
<body>
    <h1>🔧 Teste Final - Verificação das Correções</h1>
    <p>Este teste verifica se as correções aplicadas resolveram os problemas identificados:</p>
    <ul>
        <li>❌ Erro: <code>this.request is not a function</code></li>
        <li>❌ Dashboards não carregando informações</li>
        <li>❌ Média de consumo mostrando N/A</li>
        <li>❌ Tabela de abastecimentos vazia</li>
    </ul>
    
    <div id="results"></div>
    
    <script>
        // Configurar ambiente de teste
        window.ENV_CONFIG = {
            API_BASE_URL: 'https://controle-combustivel.onrender.com/api'
        };
        
        function addResult(message, type = 'info') {
            const resultsDiv = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `status ${type}`;
            div.innerHTML = message;
            resultsDiv.appendChild(div);
        }
        
        function addSection(title, content) {
            const resultsDiv = document.getElementById('results');
            const section = document.createElement('div');
            section.className = 'section';
            section.innerHTML = `<h3>${title}</h3>${content}`;
            resultsDiv.appendChild(section);
        }
        
        async function testeCompleto() {
            addResult('🚀 Iniciando teste completo das correções...', 'info');
            
            try {
                // === TESTE 1: Configuração da API ===
                const API_CONFIG = {
                    baseURL: 'https://controle-combustivel.onrender.com/api',
                    headers: { 'Content-Type': 'application/json' }
                };
                
                // === TESTE 2: Criar apiClient com correção aplicada ===
                const apiClient = {
                    async request(endpoint, options = {}) {
                        const url = `${API_CONFIG.baseURL}${endpoint}`;
                        const config = {
                            ...options,
                            headers: { ...API_CONFIG.headers, ...options.headers }
                        };
                        
                        const response = await fetch(url, config);
                        if (!response.ok) {
                            const errorData = await response.json().catch(() => ({}));
                            throw new Error(errorData.error || `Erro HTTP: ${response.status}`);
                        }
                        
                        return await response.json();
                    },
                    
                    abastecimentos: {
                        request: null, // Será configurado
                        
                        async buscarTodos() {
                            const result = await this.request('/abastecimentos');
                            
                            // Mapear campos (correção aplicada)
                            return result.map(abastecimento => {
                                const { caminhao_id, periodo_inicio, periodo_fim, km_inicial, km_final, valor_litro, valor_total, ...resto } = abastecimento;
                                return {
                                    ...resto,
                                    caminhaoId: caminhao_id,
                                    periodoInicio: periodo_inicio,
                                    periodoFim: periodo_fim,
                                    kmInicial: parseFloat(km_inicial) || 0,
                                    kmFinal: parseFloat(km_final) || 0,
                                    valorLitro: parseFloat(valor_litro) || 0,
                                    valorTotal: parseFloat(valor_total) || 0,
                                    litros: parseFloat(abastecimento.litros) || 0
                                };
                            });
                        }
                    },
                    
                    caminhoes: {
                        request: null,
                        async buscarTodos() {
                            return await this.request('/caminhoes');
                        }
                    }
                };
                
                // === CORREÇÃO PRINCIPAL: Configurar binds ===
                apiClient.abastecimentos.request = apiClient.request.bind(apiClient);
                apiClient.caminhoes.request = apiClient.request.bind(apiClient);
                
                addResult('✅ Correção 1: Binds do apiClient configurados corretamente', 'success');
                
                // === TESTE 3: Buscar dados ===
                const caminhoes = await apiClient.caminhoes.buscarTodos();
                const abastecimentos = await apiClient.abastecimentos.buscarTodos();
                
                addResult(`✅ Correção 2: Dados carregados com sucesso - ${caminhoes.length} caminhões, ${abastecimentos.length} abastecimentos`, 'success');
                
                // === TESTE 4: Verificar estrutura dos dados ===
                if (abastecimentos.length > 0) {
                    const primeiro = abastecimentos[0];
                    const temCampos = primeiro.caminhaoId && primeiro.kmInicial !== undefined && primeiro.kmFinal !== undefined;
                    
                    if (temCampos) {
                        addResult('✅ Correção 3: Mapeamento de campos funcionando (snake_case → camelCase)', 'success');
                    } else {
                        addResult('❌ Problema no mapeamento de campos', 'error');
                    }
                    
                    // Mostrar estrutura
                    const pre = document.createElement('pre');
                    pre.textContent = JSON.stringify(primeiro, null, 2);
                    addSection('📋 Estrutura dos dados (após mapeamento)', pre.outerHTML);
                }
                
                // === TESTE 5: Calcular médias de consumo ===
                let caminhoesComConsumo = 0;
                let totalConsumoCalculado = 0;
                
                caminhoes.forEach(caminhao => {
                    const abastecimentosCaminhao = abastecimentos.filter(a => a.caminhaoId === caminhao.id);
                    let totalKm = 0;
                    let totalLitros = 0;
                    
                    abastecimentosCaminhao.forEach(a => {
                        const kmInicial = parseFloat(a.kmInicial) || 0;
                        const kmFinal = parseFloat(a.kmFinal) || 0;
                        const litros = parseFloat(a.litros) || 0;
                        
                        if (kmFinal > kmInicial && litros > 0) {
                            totalKm += (kmFinal - kmInicial);
                            totalLitros += litros;
                        }
                    });
                    
                    if (totalLitros > 0 && totalKm > 0) {
                        const mediaConsumo = totalKm / totalLitros;
                        caminhoesComConsumo++;
                        totalConsumoCalculado += mediaConsumo;
                        
                        addResult(`🚛 ${caminhao.placa}: ${mediaConsumo.toFixed(2)} km/l (${abastecimentosCaminhao.length} abastecimentos)`, 'info');
                    } else {
                        addResult(`⚠️ ${caminhao.placa}: Sem dados suficientes para calcular consumo`, 'warning');
                    }
                });
                
                if (caminhoesComConsumo > 0) {
                    const mediaGeral = totalConsumoCalculado / caminhoesComConsumo;
                    addResult(`✅ Correção 4: Cálculo de consumo funcionando - Média geral: ${mediaGeral.toFixed(2)} km/l`, 'success');
                } else {
                    addResult('❌ Nenhum caminhão com dados suficientes para calcular consumo', 'error');
                }
                
                // === TESTE 6: Simular filtros de dashboard ===
                const hoje = new Date();
                const primeiroDia = new Date(hoje.getFullYear(), hoje.getMonth(), 1);
                const ultimoDia = new Date(hoje.getFullYear(), hoje.getMonth() + 1, 0, 23, 59, 59);
                
                const abastecimentosMesAtual = abastecimentos.filter(a => {
                    try {
                        const dataAbastecimento = new Date(a.data);
                        return dataAbastecimento >= primeiroDia && dataAbastecimento <= ultimoDia;
                    } catch (error) {
                        return false;
                    }
                });
                
                addResult(`✅ Correção 5: Filtro de data funcionando - ${abastecimentosMesAtual.length} abastecimentos no mês atual`, 'success');
                
                // === RESUMO FINAL ===
                addSection('🎯 Resumo das Correções', `
                    <div class="status success">
                        <strong>✅ Problemas Resolvidos:</strong><br>
                        • <code>this.request is not a function</code> - Corrigido com bind adequado<br>
                        • Mapeamento de campos snake_case → camelCase funcionando<br>
                        • Cálculo de média de consumo operacional<br>
                        • Filtros de data implementados corretamente<br>
                        • Dados sendo carregados da API com sucesso
                    </div>
                    <div class="status info">
                        <strong>📊 Dados Encontrados:</strong><br>
                        • ${caminhoes.length} caminhões no sistema<br>
                        • ${abastecimentos.length} abastecimentos registrados<br>
                        • ${caminhoesComConsumo} caminhões com dados de consumo<br>
                        • ${abastecimentosMesAtual.length} abastecimentos no mês atual
                    </div>
                `);
                
            } catch (error) {
                addResult(`❌ Erro durante o teste: ${error.message}`, 'error');
                console.error('Erro detalhado:', error);
            }
        }
        
        // Executar teste
        testeCompleto();
    </script>
</body>
</html>
